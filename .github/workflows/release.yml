name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests

      - name: Build executable
        run: .\scripts\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFDiffStudio-Windows
          path: dist/PDFDiffStudio.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests

      - name: Build app bundle
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh

      - name: Package app bundle
        run: ditto -c -k --keepParent dist/PDFDiffStudio.app PDFDiffStudio-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFDiffStudio-macOS
          path: PDFDiffStudio-macOS.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/PDFDiffStudio-Windows/PDFDiffStudio.exe \
            release-assets/PDFDiffStudio-macOS/PDFDiffStudio-macOS.zip \
            --title "PDF Diff Studio ${GITHUB_REF_NAME}" \
            --generate-notes
